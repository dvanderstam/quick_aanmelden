[build]
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # EXPO_PUBLIC_* variabelen worden by design in de client bundle gezet door Expo.
  # Ze zijn dus altijd zichtbaar in de output; dit is geen lek.
  SECRETS_SCAN_OMIT_KEYS = "EXPO_PUBLIC_SUPABASE_URL,EXPO_PUBLIC_SUPABASE_ANON_KEY,EXPO_PUBLIC_DEFAULT_PASSWORD,EXPO_PUBLIC_AUTH_EMAIL_DOMAINS"

# Proxy ICS feeds to avoid CORS issues
[[redirects]]
  from = "/api/ics/ms1"
  to = "https://api.foys.io/competition/public-api/v1/teams/c19eccfc-506d-42df-a579-28bfe45aa3a6/ics"
  status = 200
  force = true

[[redirects]]
  from = "/api/ics/ms3"
  to = "https://api.foys.io/competition/public-api/v1/teams/7852aa94-43c5-4f2d-b4d9-85fd46d25ca0/ics"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
